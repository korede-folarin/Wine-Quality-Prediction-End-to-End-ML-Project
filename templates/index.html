<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wine Quality Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }

    .card-header { margin-bottom: 1.5rem; }
    .card-header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .card-header p  { font-size: 14px; color: #888; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      height: 36px;
      border: 0.5px solid #d5d5d0;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:hover  { border-color: #aaa; }
    .field input:focus  { border-color: #555; box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }

    .result-box {
      background: #f5f5f0;
      border-radius: 8px;
      border: 0.5px solid #e0e0da;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .result-box .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .result-box .value { font-size: 28px; font-weight: 500; color: #1a1a1a; }

    button[type="submit"] {
      width: 100%;
      height: 40px;
      background: #fff;
      border: 0.5px solid #c5c5c0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover  { background: #f5f5f0; }
    button[type="submit"]:active { transform: scale(0.99); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Wine quality predictor</h1>
      <p>Enter the physicochemical properties to predict wine quality.</p>
    </div>

    <form action="/predict" method="POST">
      <div class="grid">
        <div class="field">
          <label>Fixed acidity</label>
          <input type="number" step="0.1"    name="fixed_acidity"        placeholder="7.4"    required />
        </div>
        <div class="field">
          <label>Volatile acidity</label>
          <input type="number" step="0.01"   name="volatile_acidity"     placeholder="0.70"   required />
        </div>
        <div class="field">
          <label>Citric acid</label>
          <input type="number" step="0.01"   name="citric_acid"          placeholder="0.00"   required />
        </div>
        <div class="field">
          <label>Residual sugar</label>
          <input type="number" step="0.1"    name="residual_sugar"       placeholder="1.9"    required />
        </div>
        <div class="field">
          <label>Chlorides</label>
          <input type="number" step="0.001"  name="chlorides"            placeholder="0.076"  required />
        </div>
        <div class="field">
          <label>Free sulfur dioxide</label>
          <input type="number" step="1"      name="free_sulfur_dioxide"  placeholder="11"     required />
        </div>
        <div class="field">
          <label>Total sulfur dioxide</label>
          <input type="number" step="1"      name="total_sulfur_dioxide" placeholder="34"     required />
        </div>
        <div class="field">
          <label>Density</label>
          <input type="number" step="0.0001" name="density"              placeholder="0.9978" required />
        </div>
        <div class="field">
          <label>pH</label>
          <input type="number" step="0.01"   name="pH"                   placeholder="3.51"   required />
        </div>
        <div class="field">
          <label>Sulphates</label>
          <input type="number" step="0.01"   name="sulphates"            placeholder="0.56"   required />
        </div>
        <div class="field">
          <label>Alcohol</label>
          <input type="number" step="0.1"    name="alcohol"              placeholder="9.4"    required />
        </div>
      </div>

      {% if prediction is defined %}
      <div class="result-box">
        <p class="label">Predicted quality score</p>
        <p class="value">{{ prediction }} / 10</p>
      </div>
      {% endif %}

      <button type="submit">Predict quality</button>
    </form>
  </div>
</body>
</html>
