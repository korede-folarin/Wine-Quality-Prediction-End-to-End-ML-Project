<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction Result</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #f0f7ee;
      border: 0.5px solid #c5dfc0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .result-box {
      background: #f5f5f0;
      border-radius: 12px;
      border: 0.5px solid #e0e0da;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .result-box .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .result-box .score {
      font-size: 48px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1;
      margin-bottom: 6px;
    }

    .result-box .out-of {
      font-size: 14px;
      color: #888;
    }

    .bar-track {
      width: 100%;
      height: 6px;
      background: #e5e5e0;
      border-radius: 99px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #3b6d11;
      width: {{ (prediction / 10 * 100) | round }}%;
    }

    a.back-btn {
      display: block;
      width: 100%;
      height: 40px;
      line-height: 40px;
      background: #fff;
      border: 0.5px solid #c5c5c0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      text-decoration: none;
      transition: background 0.15s;
    }

    a.back-btn:hover { background: #f5f5f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🍷</div>

    <h1>Prediction complete</h1>
    <p class="subtitle">Here is your wine quality score based on the inputs provided.</p>

    <div class="result-box">
      <p class="label">Predicted quality score</p>
      <p class="score">{{ prediction }}</p>
      <p class="out-of">out of 10</p>
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
    </div>

    <a href="/" class="back-btn">← Predict another wine</a>
  </div>
</body>
</html>
